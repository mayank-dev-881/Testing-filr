<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>My E-Commerce Store</title>
                <style>
                        /* बेसिक रिसेट */
                                * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
                                        
                                                /* नेविगेशन बार (Header) */
                                                        header { 
                                                                    background-color: #2874f0; /* Flipkart Blue */
                                                                                padding: 15px 50px; 
                                                                                            display: flex; 
                                                                                                        justify-content: space-between; 
                                                                                                                    align-items: center; 
                                                                                                                                color: white; 
                                                                                                                                        }
                                                                                                                                                .logo { font-size: 24px; font-weight: bold; font-style: italic; }
                                                                                                                                                        .search-bar { 
                                                                                                                                                                    flex: 1; 
                                                                                                                                                                                margin: 0 30px; 
                                                                                                                                                                                            padding: 10px; 
                                                                                                                                                                                                        border-radius: 2px; 
                                                                                                                                                                                                                    border: none; 
                                                                                                                                                                                                                                outline: none;
                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                .nav-links button { 
                                                                                                                                                                                                                                                            background: white; 
                                                                                                                                                                                                                                                                        color: #2874f0; 
                                                                                                                                                                                                                                                                                    border: none; 
                                                                                                                                                                                                                                                                                                padding: 8px 25px; 
                                                                                                                                                                                                                                                                                                            font-weight: bold; 
                                                                                                                                                                                                                                                                                                                        cursor: pointer; 
                                                                                                                                                                                                                                                                                                                                    border-radius: 2px; 
                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                            /* प्रोडक्ट सेक्शन (Main Content) */
                                                                                                                                                                                                                                                                                                                                                                    .product-container { 
                                                                                                                                                                                                                                                                                                                                                                                display: flex; 
                                                                                                                                                                                                                                                                                                                                                                                            flex-wrap: wrap; 
                                                                                                                                                                                                                                                                                                                                                                                                        gap: 20px; 
                                                                                                                                                                                                                                                                                                                                                                                                                    padding: 30px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                justify-content: center; 
                                                                                                                                                                                                                                                                                                                                                                                                                                            background-color: #f1f3f6; /* Light gray background */
                                                                                                                                                                                                                                                                                                                                                                                                                                                        min-height: 100vh;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* सिंगल प्रोडक्ट कार्ड */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .product-card { 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: white; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                width: 250px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            padding: 15px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 2px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text-align: center; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                transition: transform 0.2s; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .product-card:hover { 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transform: translateY(-5px); 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .product-img { 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 100%; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                height: 200px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background-color: #e0e0e0; /* यहाँ इमेज आएगी */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        margin-bottom: 15px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .product-title { font-size: 16px; color: #212121; margin-bottom: 8px;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .price { font-size: 18px; color: #212121; font-weight: bold; margin-bottom: 15px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .buy-btn { 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background-color: #ff9f00; /* Flipkart Orange/Yellow */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: white; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border: none; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: 12px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 100%; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-size: 16px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-weight: bold;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        cursor: pointer; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-radius: 2px; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .buy-btn:hover { background-color: #f39700; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <header>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="logo">MyStore</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="text" class="search-bar" placeholder="Search for products, brands and more">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="nav-links">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button>Login</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <span style="margin-left: 20px; cursor: pointer; font-weight: bold;">Cart 🛒</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </header>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="product-container">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="product-card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="product-img"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="product-title">Vivo Y21 Smartphone</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p class="price">₹13,990</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="buy-btn">Add to Cart</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="product-card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="product-img"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="product-title">Acoustic Guitar</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p class="price">₹3,499</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="buy-btn">Add to Cart</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="product-card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="product-img"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="product-title">Gaming Headphones</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p class="price">₹1,299</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="buy-btn">Add to Cart</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="product-card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="product-img"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="product-title">Blue T-Shirt</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p class="price">₹499</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="buy-btn">Add to Cart</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
